services:
  - type: web
    name: research-assistant-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:api_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CHROMA_DIR
        value: ./chroma_db
